name: ci-python

on:
  push:
    tags:
      - v*
    branches:
      - master
      - azext-aro-*
  pull_request:

permissions:
  contents: read

jobs:
  validate-python:
    runs-on: ubuntu-latest
    container:
      image: registry.access.redhat.com/ubi9/python-311:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: validate
        run: |
          make test-python
          hack/ci-utils/isClean.sh
