name: Maintenance

on:
  push:
  pull_request_target:
    types:
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: check if prs are dirty
        uses: eps1lon/actions-label-merge-conflict@0273be72a0bbd58fcd71d0d6c02c209b50d1e5e1 # releases/3.1.0
        with:
          dirtyLabel: needs-rebase
          removeOnDirtyLabel: ready-for-review
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          commentOnDirty: "Please rebase pull request."
