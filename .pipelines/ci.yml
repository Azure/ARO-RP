# Azure DevOps Pipeline running CI

trigger:
  branches:
    include:
      - master
  paths:
    exclude:
      - docs/*
  tags:
    include:
      - v2*

pr:
  paths:
    exclude:
      - docs/*

resources:
  containers:
    - container: golang
      image: registry.access.redhat.com/ubi8/go-toolset:1.21.11-1.1720406008
      options: --user=0
    - container: python
      image: registry.access.redhat.com/ubi8/python-39:latest
      options: --user=0

variables:
  - template: vars.yml

jobs:
  - job: Python_Unit_Tests
    pool:
      name: 1es-aro-ci-pool
    variables:
      HOME: $(Agent.BuildDirectory)

    steps:
      - template: ./templates/template-checkout.yml
      - script: |
          set -xe
          make test-python
          [[ -z "$(git status -s)" ]]
        displayName: 🧪Run Python Unit Tests
        target: python

  - job: Golang_Unit_Tests
    pool:
      name: 1es-aro-ci-pool
    variables:
      GOCACHE: /tmp/gocache
    steps:
      - template: ./templates/template-checkout.yml

      - script: |
          set -xe
          go version
          go env
        displayName: Print Go version & env
        target: golang

      - script: |
          set -xe
          make generate
          [[ -z "$(git status -s)" ]]
        displayName: ⚙️ Run Golang code generate
        target: golang

      - script: |
          set -xe
          make build-all
          [[ -z "$(git status -s)" ]]
        displayName: 🕵️ Build Golang code
        target: golang

      - script: |
          set -xe
          make unit-test-go
        displayName: 🧪 Run Golang unit tests
        target: golang

      - task: PublishTestResults@2
        displayName: 📊 Publish tests results
        inputs:
          testResultsFiles: $(System.DefaultWorkingDirectory)/**/report.xml
        condition: succeededOrFailed()

      - script: |
          make xmlcov
        displayName: ⚙️ Process Reports
        condition: succeededOrFailed()
        target: golang

      - task: PublishCodeCoverageResults@1
        displayName: 📈 Publish code coverage
        inputs:
          codeCoverageTool: Cobertura
          summaryFileLocation: $(System.DefaultWorkingDirectory)/**/coverage.xml
          failIfCoverageEmpty: false
        condition: succeededOrFailed()
        target: golang

  - job: Lint_Admin_Portal
    pool:
      name: 1es-aro-ci-pool
    steps:
      - template: ./templates/template-checkout.yml
      - script: |
          set -xe
          make lint-admin-portal
        displayName: 🧹 Lint Admin Portal
