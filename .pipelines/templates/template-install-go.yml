# Install Go for agent steps that invoke `go` (e.g. E2E must-gather: go build ./hack/db).
# Pattern matches sdp-pipelines (e.g. .pipelines/code-gates.yaml): parse version from module file,
# then GoTool@0. We use go.mod; sdp uses go.work. 1ES AL3 images omit Go; goDownloadUrl uses the
# Microsoft Go endpoint (see GoTool@0 docs). OneBranch jobs use golang.internalModuleProxy instead.
steps:
  - task: Bash@3
    displayName: Determine Go version
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        go_version="$(grep -Po '(?<=^go )[0-9]+\.[0-9]+\.[0-9]+$' go.mod)"
        echo "##vso[task.setvariable variable=goVersion]${go_version}"
      workingDirectory: $(ARO_CHECKOUT_PATH)

  - task: GoTool@0
    displayName: Install Go
    inputs:
      version: "$(goVersion)"
      goDownloadUrl: "$(GO_TOOL_DOWNLOAD_URL)"
