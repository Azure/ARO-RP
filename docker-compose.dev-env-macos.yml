# Compose override for macOS (Docker / OrbStack).
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev-env-macos.yml up aro-dev-env
services:
  aro-dev-env:
    privileged: true
    volumes:
      - .:/workspace
      - ~/.azure:/home/aro-dev/.azure:ro
      - ~/.ssh:/home/aro-dev/.ssh:ro
      - ./secrets:/workspace/secrets:ro
